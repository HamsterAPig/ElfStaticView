name: PR Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Windows Release Tests
    runs-on: windows-2022

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Tool Versions
        shell: pwsh
        run: |
          cmake --version
          git --version
          clang --version
          gcc --version

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Ninja"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build Test Binaries
        shell: pwsh
        run: >
          cmake --build build --config Release
          --target elf_static_view_tests elf_static_view_perf_tests elf_static_view_static_address_query_tests

      - name: Run Tests
        shell: pwsh
        run: |
          $testBinaries = @(
            (Join-Path $PWD "build\tests\Release\elf_static_view_tests.exe"),
            (Join-Path $PWD "build\tests\Release\elf_static_view_perf_tests.exe"),
            (Join-Path $PWD "build\tests\Release\elf_static_view_static_address_query_tests.exe")
          )

          foreach ($testBinary in $testBinaries) {
            if (-not (Test-Path $testBinary)) {
              throw "缺少测试可执行文件：$testBinary"
            }
          }

          ctest --test-dir build --build-config Release --output-on-failure
