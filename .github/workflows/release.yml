name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Windows Release
    runs-on: windows-2022

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Show Tool Versions
        shell: pwsh
        run: |
          cmake --version
          git --version
          clang --version

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Ninja"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build Release Executables
        shell: pwsh
        run: >
          cmake --build build --config Release
          --target elf-static-view elf-static-view-cli

      - name: Build Test Binaries
        shell: pwsh
        run: >
          cmake --build build --config Release
          --target elf_static_view_tests elf_static_view_perf_tests elf_static_view_static_address_query_tests

      - name: Run Tests
        shell: pwsh
        run: ctest --test-dir build --output-on-failure

      - name: Collect Release Executables
        shell: pwsh
        run: |
          $distDir = Join-Path $PWD "dist"
          $releaseDir = Join-Path $PWD "build\Release"
          $suffix = "${{ github.ref_name }}-windows-x64"
          $guiExe = Join-Path $distDir "ElfStaticView-$suffix.exe"
          $cliExe = Join-Path $distDir "ElfStaticView-CLI-$suffix.exe"

          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          foreach ($assetPath in @($guiExe, $cliExe)) {
            if (Test-Path $assetPath) {
              Remove-Item -LiteralPath $assetPath -Force
            }
          }

          Copy-Item -LiteralPath (Join-Path $releaseDir "elf-static-view.exe") -Destination $guiExe
          Copy-Item -LiteralPath (Join-Path $releaseDir "elf-static-view-cli.exe") -Destination $cliExe

      - name: Upload Release Executables Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-executables
          path: |
            dist/ElfStaticView-${{ github.ref_name }}-windows-x64.exe
            dist/ElfStaticView-CLI-${{ github.ref_name }}-windows-x64.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ElfStaticView-${{ github.ref_name }}-windows-x64.exe
            dist/ElfStaticView-CLI-${{ github.ref_name }}-windows-x64.exe
          generate_release_notes: true
